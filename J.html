<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Design Step 2</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #222; /* lighter dark background */

      height: auto;
      display: block;
    }
