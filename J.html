<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Design</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .tick {
    position: absolute;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
  }

  .receipt {
    position: relative;
    width: 90%;
    max-width: 360px;
    transform: translateY(-40px); /* 👈 upward shift */
  }

  .receipt img {
    width: 100%;
    display: block;
  }

</style>
</head>

<body>

<img class="tick" src="https://amankhan85.github.io/JC/tick.png">

<div class="receipt">
  <img src="https://amankhan85.github.io/JC/jsbg.png">
</div>

</body>
</html>
